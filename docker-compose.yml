services:
  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./annotation-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - FIRST_ADMIN_USERNAME=${FIRST_ADMIN_USERNAME}
      - FIRST_ADMIN_PASSWORD=${FIRST_ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./annotation_ui
      args:
        - API_URL=${API_URL}
    ports:
      - "3721:3721"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
